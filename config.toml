[server]
maxUploadSize = 400
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[theme]
base = "dark"
backgroundColor = "#0b0f17"
secondaryBackgroundColor = "#111621"
textColor = "#e2e8f0"
primaryColor = "#2f7cf6"
font = "sans serif"

[runner]
fastReruns = true

[client]
caching = true
showErrorDetails = true
